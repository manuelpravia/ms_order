openapi: 3.0.3
info:
  title: microservice for Order management - OpenAPI 3.0
  description: |-
    This microservice is designed for Orders management and belongs to the BODGEN microservices group which implements systems for warehouse management.

  version: 1.0.0

tags:
  - name: Order
    description: Operations about order
paths:
  /order:
    post:
      tags:
        - Order
      summary: Add new order
      description: Add a new order to the database
      operationId: addOrder
      requestBody:
        description: structure order creation
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
          application/xml:
            schema:
              $ref: '#/components/schemas/OrderRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrderRequest'
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        "405":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Order
      summary: Consult the list of Order
      description: Return the list of Order.
      operationId: listOrder
      parameters:
        - name: page
          in: query
          description: Page number (starting from 0)
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Number of records per page
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderPageResponse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderPageResponse'
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /order/{id}:
    put:
      tags:
        - Order
      summary: Update Order data
      description: Update Order data using id.
      operationId: updateOrder
      parameters:
        - name: id
          in: path
          description: Order identifier
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Update an existent Order in the database
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
          application/xml:
            schema:
              $ref: '#/components/schemas/OrderRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrderRequest'
        required: true
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        "400":
          description: Invalid ID Order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "405":
          description: Validation exception
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags:
        - Order
      summary: Search for a Order by  their identifier.
      description: Returned to the Order when it exists.
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          description: Order identifier
          required: true
          style: simple
          explode: false
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        "400":
          description: Invalid parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Order
      summary: Delete a Order
      description: Delete a Order
      operationId: deleteOrder
      parameters:
        - name: id
          in: path
          description: Order identifier
          required: true
          style: simple
          explode: false
          schema:
            type: integer
            format: int64
      responses:
        "400":
          description: Invalid parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    OrderRequest:
      required:
        - orderStatus
        - paymentMethod
        - userId
        - customerId
      type: object
      properties:
        amountIgv:
          type: number
          format: double
          description: product tax
          example: 128.60
        paymentMethod:
          type: string
          default: EFECTIVO
          example: EFECTIVO
          enum:
            - EFECTIVO
            - TARJETA
            - TRANFERENCIA
          description: Payment Type
        OrderStatus:
          type: string
          description: Order Status
          default: PENDING
          example: COMPLETE
          enum:
            - PENDING
            - COMPLETE
            - CANCELED
        userId:
          type: integer
          format: int64
          description: User identifier
          example: 63ab4d5b259e366938611208
        customerId:
          type: integer
          format: int64
          description: Customer identifier
          example: 63ab4d5b259e366938611208
        detail:
          type: array
          description: details of products sold
          items:
            $ref: '#/components/schemas/DetailRequest'
      xml:
        name: OrderRequest

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        OrderCode:
          type: string
          description: Orders code
          example: 00000254
        amountIgv:
          type: number
          format: double
          description: product tax
          example: 128.60
        paymentMethod:
          type: string
          default: EFECTIVO
          example: EFECTIVO
          enum:
            - EFECTIVO
            - TARJETA
            - TRANFERENCIA
            - YAPE
          description: Payment method
        discount:
          type: number
          format: double
          description: Price of discount
          example: 128.60
        priceFinal:
          type: number
          format: double
          description: Price of the shopping
          example: 128.60
        OrderStatus:
          type: string
          description: Order Status
          default: PENDING
          example: COMPLETE
          enum:
            - PENDING
            - COMPLETE
            - CANCELED
        createDate:
          type: string
          format: date-time
          description: Date of create
        changeDate:
          type: string
          format: date-time
          description: Date of change
        user:
          $ref: '#/components/schemas/User'
        customer:
          $ref: '#/components/schemas/Customer'
        detail:
          type: array
          items:
            $ref: '#/components/schemas/DetailResponse'
      xml:
        name: OrderResponse
    DetailRequest:
      type: object
      required:
        - productCode
        - quantities
      properties:
        productCode:
          type: string
          description: Product code
          example: 63AB4D
        quantities:
          type: number
          description: product quantity
          example: 5
        unitMeasurement:
          type: string
          description: Product presentation
          example: Unidad | Litro | Caja
      xml:
        name: DetailRequest
    DetailResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        productCode:
          type: string
          description: Product code
          example: 63AB4D
        productName:
          type: string
          description: Name of product
          example: Agua Cielo
        quantities:
          type: number
          description: product quantity
          example: 5
        unitMeasurement:
          type: string
          description: Product presentation
          example: Unidad | Litro | Caja
        subTotal:
          type: number
          format: double
          description: price for product
          example: 28.60
      xml:
        name: DetailResponse
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        names:
          type: string
          description: Names user
          example: Josue Elliot
        surNames:
          type: string
          description: Surname user
          example: Rivera Flores
        documentType:
          type: string
          description: Document type.
          example: DNI
        documentNumber:
          type: string
          description: Document number
          minLength: 8
          maxLength: 8
          example: "76256325"
      xml:
        name: User

    Customer:
      type: object
      properties:
        id:
          type: integer
          format: int64
        names:
          type: string
          description: Names customer
          example: Josue Elliot
        surNames:
          type: string
          description: Surname Customer
          example: Rivera Flores
        documentType:
          type: string
          description: Document type.
          example: DNI
        documentNumber:
          type: string
          description: Document number
          minLength: 8
          maxLength: 8
          example: "76256325"
      xml:
        name: Customer

    OrderPageResponse:
      type: object
      properties:
        totalCount:
          type: integer
          format: int64
          description: Total number of items in the database
          example: 100
        totalPages:
          type: integer
          description: Total number of pages
          example: 10
        pageIndex:
          type: integer
          description: Current page index
          example: 0
        pageSize:
          type: integer
          description: Number of items per page
          example: 10
        content:
          type: array
          items:
            $ref: '#/components/schemas/OrderResponse'
      description: Paginated response for orders
    Error:
      type: object
      properties:
        code:
          description: Error code
          type: string
        status:
          description: http status
          type: integer
          format: int64
        type:
          type: string
          description: Type of error
        message:
          type: string
          description: Message of error